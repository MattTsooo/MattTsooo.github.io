<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JGM Eclipse</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
<body>
  <aside class="sidebar">
    <button class="new-chat-btn">+ New chat</button>

    <div class="sidebar-section-title">Recent</div>
    <div class="chat-history">
      <div class="history-item">Blog audit draft</div>
      <div class="history-item">Dashboard review</div>
      <div class="history-item">Rewrite opening paragraph</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">JGM Eclipse</div>

    <section class="chat-container" id="chat">
      <div class="message-row">
        <div class="message bot">
          <div class="avatar bot">AI</div>
          <div class="message-content">
Hi — I can audit blog posts and dashboards.

Try:
• /auditblog
• /auditdashboard

Or just paste content and I’ll help refine it.
          </div>
        </div>
      </div>
    </section>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="prompt" placeholder="Message JGM Audit Bot..."></textarea>

        <div class="composer-actions">
          <select id="mode" class="mode-select">
            <option value="blog">Audit Blog</option>
            <option value="dashboard">Audit Dashboard</option>
            <option value="chat">General Chat</option>
          </select>

          <button id="sendBtn" class="send-btn">Send</button>
        </div>
      </div>
      <div class="hint">This is a frontend shell. Wire the Send button to your backend next.</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
