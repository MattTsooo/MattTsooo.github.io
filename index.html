<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JGM Eclipse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <button id="loginBtn" class="new-chat-btn">Login with Microsoft</button>
    <button id="newChatBtn" class="new-chat-btn">+ New chat</button>
  </aside>

  <main class="main">
    <div class="topbar">JGM Eclipse</div>

    <section class="chat-container" id="chat">
      <div class="message-row">
        <div class="message bot">
          <div class="avatar bot">AI</div>
          <div class="message-content">
Hi — I can audit blog posts and dashboards.

Try:
• /auditblog
• /auditdashboard
• /help

Or just ask a question.
          </div>
        </div>
      </div>
    </section>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="prompt" placeholder="Message JGM Eclipse..."></textarea>
        <div class="composer-actions">
          <button id="sendBtn" class="send-btn">Send</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
  <script src="msal.js"></script>
  <script src="app.js"></script>
</body>
</html>
